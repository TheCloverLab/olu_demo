name: Deploy Agent Runtime

on:
  push:
    branches: [main]
    paths:
      - 'apps/agent-runtime/**'
      - 'packages/shared/**'
      - '.github/workflows/deploy-agent-runtime.yml'
  workflow_dispatch:

env:
  AWS_REGION: us-west-2
  ECR_REPOSITORY: olu-agent-runtime
  ECS_CLUSTER: test-demo
  ECS_SERVICE: olu-agent-runtime

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Verify AWS deploy secrets
        run: |
          if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ] || [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then
            echo "::error::Missing AWS_ACCESS_KEY_ID or AWS_SECRET_ACCESS_KEY repository secrets."
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image to ECR
        id: build-image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/agent-runtime/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha,scope=agent-runtime
          cache-to: type=gha,scope=agent-runtime,mode=max

      - name: Register ECS task definition
        id: register-task-def
        run: |
          EXEC_ROLE_ARN=$(aws iam get-role --role-name ecsTaskExecutionRole --query 'Role.Arn' --output text)
          TMPFILE=$(mktemp)
          sed "s|\${EXECUTION_ROLE_ARN}|$EXEC_ROLE_ARN|g; s|\${TASK_ROLE_ARN}|$EXEC_ROLE_ARN|g" \
            apps/agent-runtime/infra/task-definition.json > "$TMPFILE"
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json "file://$TMPFILE" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          rm -f "$TMPFILE"
          echo "task_definition=$TASK_DEF_ARN" >> "$GITHUB_OUTPUT"

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --task-definition "${{ steps.register-task-def.outputs.task_definition }}" \
            --force-new-deployment

      - name: Wait for ECS service stability
        run: |
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE
